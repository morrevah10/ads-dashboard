<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Ads Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e4e4e0;
    --border-light: #efefec;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-muted: #a0a09c;
    --accent: #1a1a18;
    --green: #1a7a4a;
    --green-bg: #edf7f1;
    --amber: #92600a;
    --amber-bg: #fef7ec;
    --red: #b83232;
    --red-bg: #fdf0f0;
    --blue: #1a4fa0;
    --blue-bg: #eef3fc;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --border: #2e2e2b;
      --border-light: #252523;
      --text-primary: #f0f0ed;
      --text-secondary: #8a8a85;
      --text-muted: #555552;
      --green: #4ade80;
      --green-bg: #0d2b1a;
      --amber: #fbbf24;
      --amber-bg: #251c08;
      --red: #f87171;
      --red-bg: #2a1010;
      --blue: #60a5fa;
      --blue-bg: #0d1a2e;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  .page { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

  header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }

  .header-left h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; color: var(--text-primary); }
  .header-left p { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .range-btns { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 3px; gap: 2px; }

  .range-btn {
    font-size: 13px; padding: 5px 13px;
    border: none; border-radius: var(--radius-sm);
    background: transparent; color: var(--text-secondary);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .range-btn:hover { color: var(--text-primary); }
  .range-btn.active { background: var(--accent); color: #fff; font-weight: 500; }

  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; padding: 6px 14px;
    border: 1px solid var(--border); border-radius: var(--radius-md);
    background: var(--surface); color: var(--text-secondary);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .refresh-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }
  .refresh-btn svg { width: 14px; height: 14px; }

  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.1rem 1.25rem;
    box-shadow: var(--shadow);
  }
  .card-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
  .card-value { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; color: var(--text-primary); line-height: 1; }
  .card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }

  .table-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
    box-shadow: var(--shadow);
  }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead { background: var(--bg); }

  th {
    padding: 10px 16px; text-align: left;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  th:hover { color: var(--text-secondary); }
  th.sorted { color: var(--text-primary); }
  .sort-icon { margin-left: 4px; opacity: 0.5; font-style: normal; }
  th.sorted .sort-icon { opacity: 1; }

  td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border-light);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 13px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  .col-adname { width: 24%; }
  .col-camp   { width: 18%; }
  .col-adset  { width: 18%; }
  .col-spent  { width: 13%; text-align: right; }
  .col-leads  { width: 10%; text-align: right; }
  .col-cpl    { width: 17%; text-align: right; }

  .num { text-align: right; font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .muted { color: var(--text-muted); }
  .secondary { color: var(--text-secondary); }

  .badge {
    display: inline-flex; align-items: center;
    font-size: 12px; font-weight: 500;
    padding: 3px 10px; border-radius: 99px;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-red   { background: var(--red-bg);   color: var(--red);   }

  .status-row td { text-align: center; padding: 3rem; color: var(--text-secondary); }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--border); border-top-color: var(--text-secondary);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    margin-top: 1.25rem;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 8px;
  }
  .footer-text { font-size: 12px; color: var(--text-muted); }
  .footer-link { font-size: 12px; color: var(--text-muted); text-decoration: none; }
  .footer-link:hover { color: var(--text-secondary); }

  @media (max-width: 640px) {
    .page { padding: 1rem; }
    header { flex-direction: column; }
    .card-value { font-size: 22px; }
    th, td { padding: 8px 10px; font-size: 12px; }
    .col-camp, .col-adset { display: none; }
    .col-adname { width: 40%; }
    .col-spent  { width: 20%; }
    .col-leads  { width: 15%; }
    .col-cpl    { width: 25%; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-left">
      <h1>Facebook Ads Dashboard</h1>
      <p id="subtitle">Loading data…</p>
    </div>
    <div class="header-right">
      <div class="range-btns">
        <button class="range-btn" data-days="1">Today</button>
        <button class="range-btn" data-days="7">7 days</button>
        <button class="range-btn active" data-days="30">30 days</button>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2"/>
          <polyline points="13.5 2 13.5 5 10.5 5"/>
        </svg>
        Refresh
      </button>
    </div>
  </header>

  <div class="summary">
    <div class="card"><div class="card-label">Total spent</div><div class="card-value" id="s-spent">—</div></div>
    <div class="card"><div class="card-label">Total leads</div><div class="card-value" id="s-leads">—</div></div>
    <div class="card"><div class="card-label">Avg. cost per lead</div><div class="card-value" id="s-cpl">—</div></div>
    <div class="card"><div class="card-label">Active ads</div><div class="card-value" id="s-ads">—</div></div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="col-adname" data-col="ad_name">Ad name <i class="sort-icon">↕</i></th>
          <th class="col-camp"   data-col="campaign_name">Campaign <i class="sort-icon">↕</i></th>
          <th class="col-adset"  data-col="adset_name">Ad set <i class="sort-icon">↕</i></th>
          <th class="col-spent num sorted" data-col="spent">Spent <i class="sort-icon">↓</i></th>
          <th class="col-leads num" data-col="leads">Leads <i class="sort-icon">↕</i></th>
          <th class="col-cpl num"   data-col="cpl">Cost / lead <i class="sort-icon">↕</i></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="status-row"><td colspan="6"><span class="spinner"></span> Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <footer>
    <span class="footer-text" id="last-updated"></span>
    <span class="footer-text">Data via Facebook Marketing API</span>
  </footer>

</div>

<script>
const SHEET_ID = '1fuBgE5_GVRzKURCcybea56r2MgtgPMhR7JT1SCzJuwE';
const SHEET_NAME = 'ads_data';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

let allRows = [];
let sortCol = 'spent';
let sortDir = -1;
let activeDays = 30;

function parseSheetDate(cell) {
  if (!cell) return '';
  if (cell.f) return String(cell.f).slice(0, 10);
  const v = cell.v;
  if (!v) return '';
  if (typeof v === 'string') return v.slice(0, 10);
  const m = String(v).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m) {
    const yr = m[1], mo = String(+m[2]+1).padStart(2,'0'), dy = String(+m[3]).padStart(2,'0');
    return `${yr}-${mo}-${dy}`;
  }
  return String(v).slice(0, 10);
}

async function loadData() {
  setLoading();
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, ''));
    allRows = (json.table.rows || []).map(r => {
      const c = r.c || [];
      return {
        date_start:    parseSheetDate(c[0]),
        campaign_name: c[2]?.v || '',
        adset_name:    c[3]?.v || '',
        ad_id:         String(c[4]?.v || ''),
        ad_name:       c[5]?.v || '',
        spent:         parseFloat(c[7]?.v || 0),
        leads:         parseInt(c[8]?.v || 0),
      };
    }).filter(r => r.date_start);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    render();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr class="status-row"><td colspan="6">Could not load data. Make sure the Google Sheet is shared publicly as Viewer.</td></tr>`;
    document.getElementById('subtitle').textContent = 'Connection error';
    console.error(e);
  }
}

function getFromDate(days) {
  const d = new Date();
  d.setDate(d.getDate() - days + 1);
  return d.toISOString().slice(0, 10);
}

function aggregateByAd(days) {
  const from = getFromDate(days);
  const to = new Date().toISOString().slice(0, 10);
  const map = {};
  allRows.forEach(row => {
    if (row.date_start < from || row.date_start > to) return;
    if (!map[row.ad_id]) {
      map[row.ad_id] = { ad_id: row.ad_id, ad_name: row.ad_name, campaign_name: row.campaign_name, adset_name: row.adset_name, spent: 0, leads: 0 };
    }
    map[row.ad_id].spent += row.spent;
    map[row.ad_id].leads += row.leads;
  });
  return Object.values(map).map(r => ({ ...r, cpl: r.leads > 0 ? r.spent / r.leads : Infinity }));
}

function fmt(n)    { return '₪' + Math.round(n).toLocaleString(); }
function fmtD(n)   { return '₪' + n.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 1 }); }
function esc(s)    { return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function setLoading() {
  document.getElementById('tbody').innerHTML = '<tr class="status-row"><td colspan="6"><span class="spinner"></span> Refreshing data…</td></tr>';
  ['s-spent','s-leads','s-cpl','s-ads'].forEach(id => document.getElementById(id).textContent = '—');
}

function render() {
  let rows = aggregateByAd(activeDays);

  rows.sort((a, b) => {
    let av = a[sortCol] === Infinity ? 9999999 : a[sortCol];
    let bv = b[sortCol] === Infinity ? 9999999 : b[sortCol];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });

  const totalSpent = rows.reduce((s, r) => s + r.spent, 0);
  const totalLeads = rows.reduce((s, r) => s + r.leads, 0);
  const avgCpl = totalLeads > 0 ? totalSpent / totalLeads : 0;

  document.getElementById('s-spent').textContent = fmt(totalSpent);
  document.getElementById('s-leads').textContent = totalLeads;
  document.getElementById('s-cpl').textContent   = avgCpl > 0 ? fmtD(avgCpl) : '—';
  document.getElementById('s-ads').textContent   = rows.length;

  const label = activeDays === 1 ? 'today' : `last ${activeDays} days`;
  document.getElementById('subtitle').textContent = `Showing data for ${label} · ${rows.length} active ad${rows.length !== 1 ? 's' : ''}`;

  if (rows.length === 0) {
    document.getElementById('tbody').innerHTML = '<tr class="status-row"><td colspan="6">No data for this period.</td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML = rows.map(r => {
    const cplVal = r.cpl === Infinity ? null : r.cpl;
    let badge = '';
    if (cplVal !== null) {
      if (cplVal < 100)      badge = `<span class="badge badge-green">${fmtD(cplVal)}</span>`;
      else if (cplVal < 200) badge = `<span class="badge badge-amber">${fmtD(cplVal)}</span>`;
      else                   badge = `<span class="badge badge-red">${fmtD(cplVal)}</span>`;
    } else {
      badge = `<span class="muted">—</span>`;
    }
    return `<tr>
      <td class="col-adname" title="${esc(r.ad_name)}">${esc(r.ad_name)}</td>
      <td class="col-camp secondary" title="${esc(r.campaign_name)}">${esc(r.campaign_name)}</td>
      <td class="col-adset secondary" title="${esc(r.adset_name)}">${esc(r.adset_name)}</td>
      <td class="col-spent num">${fmt(r.spent)}</td>
      <td class="col-leads num${r.leads === 0 ? ' muted' : ''}">${r.leads === 0 ? '—' : r.leads}</td>
      <td class="col-cpl num">${badge}</td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeDays = parseInt(btn.dataset.days);
    render();
  });
});

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortDir = sortCol === col ? sortDir * -1 : -1;
    sortCol = col;
    document.querySelectorAll('th').forEach(t => {
      t.classList.remove('sorted');
      t.querySelector('.sort-icon').textContent = '↕';
    });
    th.classList.add('sorted');
    th.querySelector('.sort-icon').textContent = sortDir === -1 ? '↓' : '↑';
    render();
  });
});

loadData();
</script>
</body>
</html>
